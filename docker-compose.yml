version: '3.8'

services:
  # LeoRAG Application
  leorag:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://leorag:leorag@postgres:5432/leorag
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - leorag-network

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=leorag
      - POSTGRES_USER=leorag
      - POSTGRES_PASSWORD=leorag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - leorag-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - leorag-network

  # Neo4j for GraphRAG (optional)
  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/leorag123
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - leorag-network

volumes:
  postgres_data:
  redis_data:
  neo4j_data:

networks:
  leorag-network:
    driver: bridge